<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box}
body { margin:0; background:#050505; color:#fff; font-family:Arial; }#aurora { position:fixed; inset:0; background:linear-gradient(120deg,#5227ff,#7cff67,#5227ff); background-size:300% 300%; animation:aurora 10s infinite ease; filter:blur(120px); opacity:0.3; z-index:-1; } @keyframes aurora {0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}

#canvas { width:100%; height:70vh; position:relative; }

.node { position:absolute; padding:12px; border-radius:14px; backdrop-filter:blur(20px); background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2); cursor:grab; min-width:100px; font-size:14px; }

.port { width:10px; height:10px; border-radius:50%; background:#7cff67; position:absolute; right:-5px; top:50%; transform:translateY(-50%); }

.line { position:absolute; height:2px; background:#7cff67; transform-origin:left center; }

.panel { width:100%; background:#111; padding:15px; border-top:1px solid #333; }

input, textarea { width:100%; margin-top:10px; padding:10px; background:#000; color:#fff; border:none; border-radius:8px; }

button { margin-top:10px; padding:12px; border:none; border-radius:10px; width:100%; font-weight:bold; }

.run { background:#7cff67; } .save { background:#00c6ff; }

.output { margin-top:10px; background:#000; padding:10px; border-radius:8px; font-size:14px; }

.topbar { padding:10px; background:#000; display:flex; justify-content:space-between; }

@media(min-width:768px){ #canvas{height:100vh} .panel{position:fixed; right:0; top:0; width:280px; height:100vh} } </style>

</head>
<body><div id="aurora"></div><div class="topbar">
 <b>FlowAI</b>
 <button onclick="addNode()">+ Node</button>
</div><div id="canvas"></div><div class="panel">
 <h3>Node Settings</h3>
 <input id="nodeTitle" placeholder="Title">
 <textarea id="nodePrompt" placeholder="Prompt (use {{input}})"></textarea>
 <button class="save" onclick="saveNode()">Save</button>
 <button class="run" onclick="runFlow()">Run Workflow</button>
 <div id="result" class="output"></div>
</div><script>
const canvas=document.getElementById('canvas');
let nodes=[];
let connections=[];
let selectedNode=null;
let connectingFrom=null;

function createNode(x=100,y=100,text="Node"){
 const n=document.createElement('div');
 n.className='node';
 n.innerText=text;
 n.prompt="";
 n.style.left=x+'px';
 n.style.top=y+'px';

 const port=document.createElement('div');
 port.className='port';
 n.appendChild(port);

 port.onclick=(e)=>{ e.stopPropagation(); connectingFrom=n; }

 n.onclick=()=>{
  selectedNode=n;
  nodeTitle.value=n.innerText;
  nodePrompt.value=n.prompt;
 }

 let offsetX, offsetY;
 n.onmousedown=e=>{
  offsetX=e.offsetX; offsetY=e.offsetY;
  document.onmousemove=ev=>{
   n.style.left=(ev.clientX-offsetX)+'px';
   n.style.top=(ev.clientY-offsetY)+'px';
   drawLines();
  }
  document.onmouseup=()=>document.onmousemove=null;
 }

 canvas.appendChild(n);
 nodes.push(n);
}

canvas.onclick=(e)=>{
 if(connectingFrom){
  const target=document.elementFromPoint(e.clientX,e.clientY);
  if(target.classList.contains('node')){
   connections.push({from:connectingFrom,to:target});
  }
  connectingFrom=null;
  drawLines();
 }
}

function drawLines(){
 document.querySelectorAll('.line').forEach(l=>l.remove());
 connections.forEach(c=>{
  const a=c.from.getBoundingClientRect();
  const b=c.to.getBoundingClientRect();
  const x1=a.right; const y1=a.top+a.height/2;
  const x2=b.left; const y2=b.top+b.height/2;
  const length=Math.hypot(x2-x1,y2-y1);
  const angle=Math.atan2(y2-y1,x2-x1)*180/Math.PI;
  const line=document.createElement('div');
  line.className='line';
  line.style.width=length+'px';
  line.style.left=x1+'px';
  line.style.top=y1+'px';
  line.style.transform=`rotate(${angle}deg)`;
  canvas.appendChild(line);
 });
}

function saveNode(){
 if(selectedNode){
  selectedNode.innerText=nodeTitle.value;
  selectedNode.prompt=nodePrompt.value;
 }
}

async function runFlow(){
 let current = nodes[0];
 let input = "AI";

 for(let conn of connections){
  if(conn.from===current){
   let prompt = conn.from.prompt.replace("{{input}}", input);

   // SAFE DEMO (no API key needed)
   input = "Generated: " + prompt;

   current = conn.to;
  }
 }

 result.innerText = input;
}

function addNode(){
 createNode(Math.random()*200+50,Math.random()*200+50,"New Node");
}

// initial
createNode(80,150,"Input");
createNode(220,250,"AI Node");
createNode(350,150,"Output");
</script></body>
</html>
